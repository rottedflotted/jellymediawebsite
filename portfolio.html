<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lettera+Mono+LL&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f4f0;
      --grey: #888;
      --light-grey: #ddd;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--black);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s;
    }
    .cursor.expand {
      width: 40px;
      height: 40px;
      background: transparent;
      border: 1px solid var(--black);
    }

    /* Header */
    header {
      padding: 3rem 3rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--black);
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .site-subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey);
    }

    /* Gallery */
    main {
      flex: 1;
      padding: 2.5rem 3rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: none;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
      transition: transform var(--transition), filter var(--transition);
    }

    .gallery-item:hover img {
      transform: scale(1.04);
      filter: grayscale(80%);
    }

    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,10,0);
      transition: background var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .gallery-item:hover .overlay {
      background: rgba(10,10,10,0.18);
    }

    .gallery-item .caption {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity var(--transition), transform var(--transition);
    }

    .gallery-item:hover .caption {
      opacity: 1;
      transform: translateY(0);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.96);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      filter: grayscale(100%);
      transform: scale(0.96);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: block;
    }

    .lightbox.active img {
      transform: scale(1);
    }

    .lightbox-close {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      background: none;
      border: none;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      cursor: none;
      opacity: 0.4;
      transition: opacity 0.2s;
      padding: 1rem;
      line-height: 1;
    }

    .lightbox-nav:hover { opacity: 1; }
    .lightbox-nav.prev { left: 1.5rem; }
    .lightbox-nav.next { right: 1.5rem; }

    .lightbox-counter {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(245,244,240,0.4);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--black);
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .footer-contact {
      display: flex;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-contact a {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      cursor: none;
    }

    .footer-contact a:hover {
      border-bottom-color: var(--black);
    }

    .footer-right {
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      color: var(--grey);
      text-transform: uppercase;
    }

    /* Fade-in animation on load */
    .gallery-item {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger delays */
    .gallery-item:nth-child(1)  { animation-delay: 0.05s; }
    .gallery-item:nth-child(2)  { animation-delay: 0.12s; }
    .gallery-item:nth-child(3)  { animation-delay: 0.19s; }
    .gallery-item:nth-child(4)  { animation-delay: 0.26s; }
    .gallery-item:nth-child(5)  { animation-delay: 0.33s; }
    .gallery-item:nth-child(6)  { animation-delay: 0.40s; }
    .gallery-item:nth-child(7)  { animation-delay: 0.47s; }
    .gallery-item:nth-child(8)  { animation-delay: 0.54s; }
    .gallery-item:nth-child(9)  { animation-delay: 0.61s; }
    .gallery-item:nth-child(n+10) { animation-delay: 0.68s; }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 2rem 1.25rem 1.5rem; flex-direction: column; gap: 0.5rem; }
      main { padding: 1.5rem 1.25rem; }
      .gallery { gap: 3px; }
      footer { padding: 2rem 1.25rem; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
      .lightbox-nav { font-size: 1.8rem; }
      body { cursor: auto; }
      .cursor { display: none; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- Header -->
  <header>
    <h1 class="site-title">Your Name</h1>
    <span class="site-subtitle">Photography</span>
  </header>

  <!-- Gallery -->
  <main>
    <div class="gallery" id="gallery">
      <!-- 
        HOW TO ADD YOUR PHOTOS:
        Replace the src attributes below with your own image paths.
        Add or remove <div class="gallery-item"> blocks as needed.
        The data-full attribute can point to a higher-resolution version.
        The data-caption attribute sets the hover label.
      -->

      <div class="gallery-item" onclick="openLightbox(0)">
        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600&q=80" 
             data-full="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1600&q=90"
             data-caption="Mist — 2024" alt="Forest mist" loading="lazy" />
        <div class="overlay"><span class="caption">Mist — 2024</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(1)">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=90"
             data-caption="Summit — 2024" alt="Mountain summit" loading="lazy" />
        <div class="overlay"><span class="caption">Summit — 2024</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(2)">
        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=90"
             data-caption="Aerial — 2023" alt="Aerial landscape" loading="lazy" />
        <div class="overlay"><span class="caption">Aerial — 2023</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(3)">
        <img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=1600&q=90"
             data-caption="Still Water — 2023" alt="Still water reflection" loading="lazy" />
        <div class="overlay"><span class="caption">Still Water — 2023</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(4)">
        <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1600&q=90"
             data-caption="Old Growth — 2023" alt="Forest old growth" loading="lazy" />
        <div class="overlay"><span class="caption">Old Growth — 2023</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(5)">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600&q=90"
             data-caption="Ridge — 2022" alt="Mountain ridge" loading="lazy" />
        <div class="overlay"><span class="caption">Ridge — 2022</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(6)">
        <img src="https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=1600&q=90"
             data-caption="Boreal — 2022" alt="Boreal forest" loading="lazy" />
        <div class="overlay"><span class="caption">Boreal — 2022</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(7)">
        <img src="https://images.unsplash.com/photo-1431440869543-efaf3388c585?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1431440869543-efaf3388c585?w=1600&q=90"
             data-caption="Shore — 2022" alt="Coastal shore" loading="lazy" />
        <div class="overlay"><span class="caption">Shore — 2022</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(8)">
        <img src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1600&q=90"
             data-caption="Passage — 2021" alt="Mountain passage" loading="lazy" />
        <div class="overlay"><span class="caption">Passage — 2021</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(9)">
        <img src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1600&q=90"
             data-caption="Passage — 2021" alt="Mountain passage" loading="lazy" />
        <div class="overlay"><span class="caption">Passage — 2021</span></div>
      </div>

      <div class="gallery-item" onclick="openLightbox(10)">
        <img src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=600&q=80"
             data-full="https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1600&q=90"
             data-caption="Passage — 2021" alt="Mountain passage" loading="lazy" />
        <div class="overlay"><span class="caption">Passage — 2021</span></div>
      </div>

    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <div class="lightbox-inner">
      <img src="" alt="" id="lightbox-img" />
    </div>
    <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
    <button class="lightbox-nav prev" onclick="navigate(-1)">&#8592;</button>
    <button class="lightbox-nav next" onclick="navigate(1)">&#8594;</button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-name">Your Name</div>
    <div class="footer-contact">
      <a href="mailto:hello@yourname.com">hello@yourname.com</a>
      <a href="https://instagram.com/yourhandle" target="_blank" rel="noopener">Instagram</a>
      <a href="https://vsco.co/yourhandle" target="_blank" rel="noopener">VSCO</a>
      <a href="https://500px.com/yourhandle" target="_blank" rel="noopener">500px</a>
    </div>
    <div class="footer-right">&copy; 2026</div>
  </footer>

  <script>
    // ── Custom cursor ──────────────────────────────────────────
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, .gallery-item').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
    });

    // ── Lightbox ───────────────────────────────────────────────
    const items = Array.from(document.querySelectorAll('.gallery-item img'));
    let current = 0;

    function openLightbox(index) {
      current = index;
      showImage();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function showImage() {
      const img   = items[current];
      const lb    = document.getElementById('lightbox-img');
      lb.src      = img.dataset.full || img.src;
      lb.alt      = img.alt;
      document.getElementById('lightbox-counter').textContent =
        (current + 1) + ' / ' + items.length;
    }

    function navigate(dir) {
      current = (current + dir + items.length) % items.length;
      const lb = document.getElementById('lightbox-img');
      lb.style.opacity = '0';
      setTimeout(() => { showImage(); lb.style.opacity = '1'; }, 150);
    }

    function handleLightboxClick(e) {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    // Keyboard nav
    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape')       closeLightbox();
      if (e.key === 'ArrowRight')   navigate(1);
      if (e.key === 'ArrowLeft')    navigate(-1);
    });

    // Smooth opacity transition on image swap
    const lbImg = document.getElementById('lightbox-img');
    lbImg.style.transition = 'opacity 0.15s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1)';
  </script>
</body>
</html>
